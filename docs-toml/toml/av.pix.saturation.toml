[object]
name = "av.pix.saturation"
digest = "Change the saturation of a texture"
description = "Change the saturation for a texture. Uses the luminance algorithm. Note: Max9 users can also use jit.fx.brcosa"

[messages]
[messages.jit_gl_texture]
digest = "Process an incoming texture"
description = "Process an incoming texture"

[messages.float]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: adjust the saturation (default = 1) <br/>
inlet 1: adjust the saturation (default = 1) <br/>
"""
args = [ { name = "float", type = "float", optional = 1 } ]

[messages.int]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: adjust the saturation (default = 1) <br/>
"""
args = [ { name = "int", type = "int", optional = 1 } ]

[arguments.saturation]
optional = 1
type = "float"
