[object]
name = "av.pix.mask"
digest = "Create a black/white mask from an image"
description = "Create a black/white mask from an incoming texture based on a specified range. Use either brightness or hue for the range-test to create the mask. Also generates an alpha channel for the mask to be combined with blending in a layer."

[messages]
[messages.jit_gl_texture]
digest = "Process an incoming texture"
description = "Process an incoming texture"

[messages.float]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: lower detection threshold (default = 0.3) <br/>
inlet 2: upper detection threshold (default = 0.45) <br/>
inlet 3: tolerance for detection (default = 0.1)
"""
args = [ { name = "float", type = "float", optional = 1 } ]

[messages.int]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: lower detection threshold (default = 0.3) <br/>
inlet 2: upper detection threshold (default = 0.45) <br/>
inlet 3: tolerance for detection (default = 0.1)
"""
args = [ { name = "int", type = "int", optional = 1 } ]

# [messages.list]

[arguments]
[arguments.lower]
digest = "lower detection threshold (default = 0.3)"
type = "float"
optional = 1

[arguments.upper]
digest = "upper detection threshold (default = 0.45)"
type = "float"
optional = 1

[arguments.tolerance]
digest = "tolerance for detection (default = 0.1)"
type = "float"
optional = 1

[attributes]
[attributes.mode]
digest = "detection mode (options: 0: luma, 1: hue, default = 0)"
type = "int"
size = 1

[attributes.bypass]
digest = "bypass the pixel processing"
type = "bool"
size = 1
default = { value = 0, size = 1, type = 'bool' }
