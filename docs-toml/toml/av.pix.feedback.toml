[object]
name = "av.pix.feedback"
digest = "Mix two textures with feedback"
description = "Mix two textures with feedback and various feedback modes"

[messages]
[messages.jit_gl_texture]
digest = "Function depends on inlet"
description = """
inlet 0: Process incoming texture<br/>
inlet 1: Feed back the output texture<br/>
"""
args = [ { name = "jit_gl_texture", type = "jit_gl_texture", optional = 0 } ]

[messages.int]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: none <br/>
inlet 2: feedback amount (default = 0.95) <br/>
inlet 3: feedback mode (default = 0, linear mix)
"""
args = [ { name = "int", type = "int", optional = 1 } ]

[messages.float]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: none <br/>
inlet 2: feedback amount (default = 0.95) <br/>
inlet 3: feedback mode (default = 0, 0: mix, 1: add, 2: max, 3: sub-falloff-add)
"""
args = [ { name = "float", type = "float", optional = 1 } ]

[arguments]
[arguments.feedback]
digest = "feedback amount (default = 0.95)"
type = "float"
optional = 1

[arguments.mode]
digest = "feedback mode (options: 0: mix, 1: add, 2: max, 3: sub-falloff-add, default = 0)"
type = "int"
optional = 1
description = """
mode 0: linear mix between in1 and in2 based on feedback factor<br/>
mode 1: additive feedback, by adding in2 times feedback to in1<br/>
mode 2: linear mix between in1 and maximum between in1-in2 times feedback factor<br/>
mode 3: additive feedback with subtractive falloff factor to reduce feedback blowing to white when approaching a feedback of 1<br/>
"""

[attributes]
[attributes.bypass]
digest = "bypass the pixel processing"
description = "bypass the pixel processing"
type = "bool"
size = 1
default = { value = 0, size = 1, type = 'bool' }

[attributes.filter]
digest = "filter for the texture resampling (options: linear, none)"
type = "symbol"
size = 1
default = { value = "linear", size = 1, type = 'symbol' }
