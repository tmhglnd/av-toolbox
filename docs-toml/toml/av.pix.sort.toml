[object]
name = "av.pix.sort"
digest = "Very basic pixel sorting"
description = """A very basic pixel sorting between cell and neighbouring pixel based on hue (color) value. Works well in a feedback loop with av.pix.feedback. The sorting should happen iteratively over a feedback loop to have a proper effect, but it is a quite naive sorting.<br/><br/>

Note: Max 9 users can have a look at jit.fx.pixelsorting and jit.fx.ge.lineinterp for similar effects.
"""

[messages]
[messages.jit_gl_texture]
digest = "Process an incoming texture"
description = "Process an incoming texture"

[messages.float]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: sorting direction X-axis in pixels (default = 0.5) <br/>
inlet 2: sorting direction Y-axis in pixels (default = 0.5) <br/>
"""
args = [ { name = "float", type = "float", optional = 1 } ]

[messages.int]
digest = "Function depends on inlet"
description = """
Function depends on inlet<br/><br/>
inlet 0: enable/disable processing <br/>
inlet 1: sorting direction X-axis in pixels (default = 0.5) <br/>
inlet 2: sorting direction Y-axis in pixels (default = 0.5) <br/>
"""
args = [ { name = "int", type = "int", optional = 1 } ]

[arguments]
[arguments.sort_x]
optional = 1
type = "float"
digest = "sorting direction X-axis in pixels (default = 0.5)"

[arguments.sort_y]
optional = 1
type = "float"
digest = "sorting direction Y-axis in pixels (default = 0.5)"

[attributes]
[attributes.bypass]
digest = "bypass the pixel processing (default = 0)"
type = "bool"
size = 1
default = { value = 0, size = 1, type = 'bool' }

[attributes.filter]
digest = "filter for the texture resampling (options: linear, none)"
type = "symbol"
size = 1
default = { value = "linear", size = 1, type = 'symbol' }
